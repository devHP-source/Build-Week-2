<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./buildWeek2/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Air-BnB-Clone</title>
</head>
<body>

    <main>
        <section class="places-section mx-5 mb-5">
    
    <div class="carousel-top-bar d-flex justify-content-between align-items-center mb-3">
        
        <h2 class="places-title fs-4 fw-bold mb-0">
            <a href="#" class="text-decoration-none text-dark ms-2">
                Barcellona: alloggi popolari 
                <i class="bi bi-arrow-right ms-2 fs-5"></i>
            </a>
        </h2>

        <div class="carousel-controls">
            <button class="btn btn-light rounded-circle shadow-sm me-2 btn-prev" aria-label="Previous">
                <i class="bi bi-chevron-left"></i>
            </button>
            <button class="btn btn-light rounded-circle shadow-sm btn-next" aria-label="Next">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>   
    </div>
    <div class="airbnb-slider-wrapper overflow-hidden position-relative">
        <div class="airbnb-track d-flex flex-nowrap overflow-auto">
            
            <div class="col-10 col-sm-6 col-md-4 col-lg-3 col-xl-2 flex-shrink-0 px-2">
                <div class="airbnb-card position-relative">
                    <div class="img-wrapper position-relative mb-2">
                        <img src="assets/barcellona/barcellona1.avif" alt="Appartamento a Barcellona" class="img-fluid rounded-4 w-100 object-fit-cover">
                        
                        <button class="badge-love position-absolute top-0 start-0 m-2 bg-white px-2 py-1 rounded-pill shadow-sm fw-bold border-0" style="font-size: 0.8rem;color: rgb(76, 76, 76);">
                           Amato dagli ospiti
                        </button>
                        <button class="btn-heart position-absolute top-0 end-0 m-2 bg-transparent border-0 text-white">
                            <i class="bi bi-heart fs-5 drop-shadow"></i>
                        </button>
                    </div>

                    <div class="card-info">
                        <div class="d-flex justify-content-between">
                            <a href="#" class="fw-bold text-truncate text-decoration-none text-dark">Appartamento · Barcellona</a>
                            <span><i class="bi bi-star-fill text-secondary small"></i> 4,84</span>
                        </div>
                        <div class="text-muted small">11-13 dic · Host privato</div>
                        <div class="mt-1"><span class="fw-bold">446 €</span> in totale</div>
                    </div>
                </div>
            </div>

            <div class="col-10 col-sm-6 col-md-4 col-lg-3 col-xl-2 flex-shrink-0 px-2 d-flex">
                <div class="card-mostra-tutto w-100 h-100 d-flex flex-column align-items-center justify-content-center rounded-4 shadow-sm border" style="cursor: pointer;">
                    <span class="fw-bold text-decoration-underline mt-3">Mostra tutto</span>
                </div>
            </div>

        </div>
    </div>

</section>

    </main>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="./buildWeek2/js/script.js"></script>
</body>
</html>
